<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>赛排 SaiPair</title>
  <style>
    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }
    ::view-transition-new(root) {
      clip-path: circle(0px at var(--toggle-x) var(--toggle-y));
      animation: theme-reveal 0.5s ease-in-out forwards;
    }
    ::view-transition-old(root) {
      z-index: 1;
    }
    ::view-transition-new(root) {
      z-index: 9999;
    }
    @keyframes theme-reveal {
      to {
        clip-path: circle(var(--toggle-radius) at var(--toggle-x) var(--toggle-y));
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
